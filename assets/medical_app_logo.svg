<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1034 1034" width="1024" height="1034" role="img" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">App logo icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A teal rounded-square app icon with a circular badge containing a white medical cross and an ECG pulse line.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A5568"/>
      <stop offset="55%" stop-color="#2C7A8C"/>
      <stop offset="100%" stop-color="#3A9BB0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#00000040"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="512" cy="512" r="280"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGrad)" rx="220" style="stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <circle cx="512" cy="512" r="320" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="3" style="fill:none;stroke:rgba(255, 255, 255, 0.1);color:rgb(11, 11, 11);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <circle cx="512" cy="512" r="282" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.30)" stroke-width="3" filter="url(#shadow)" style="fill:rgba(255, 255, 255, 0.13);stroke:rgba(255, 255, 255, 0.3);color:rgb(11, 11, 11);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <rect x="476" y="368" width="72" height="200" rx="22" fill="white" opacity="0.96" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.96;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="412" y="432" width="200" height="72" rx="22" fill="white" opacity="0.96" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.96;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <g clip-path="url(#circleClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <polyline points="&#10;        232,560&#10;        312,560&#10;        338,530&#10;        350,560&#10;        376,560&#10;        392,560&#10;        410,480&#10;        428,640&#10;        444,560&#10;        472,560&#10;        490,510&#10;        504,610&#10;        518,560&#10;        546,560&#10;        560,515&#10;        568,604&#10;        576,560&#10;        634,560&#10;        720,560&#10;        792,560&#10;      " fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgba(255, 255, 255, 0.5);color:rgb(11, 11, 11);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
